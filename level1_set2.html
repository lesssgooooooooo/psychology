<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz - Set 2</title>
<style>
  body { font-family: sans-serif; padding: 20px; background: #fffbf5; }
  .card { background: #fff; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
  .option { display: block; margin: 5px 0; padding: 10px; width: 100%; text-align: left; cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 5px; }
  .option:hover { background: #f0f0f0; }
  .correct { color: #0d7a6e; font-weight: bold; margin-top: 10px; }
  .wrong { color: #d94f4f; font-weight: bold; margin-top: 10px; }
  .hidden { display: none; }
  .explanation { background: #f8f9ff; padding: 10px; margin-top: 10px; border-left: 4px solid #f4a435; border-radius: 4px; }
  #progress { font-size: 1.2em; font-weight: bold; margin-bottom: 20px; }
  .nav { margin-top: 20px; display: flex; gap: 10px; }
  .nav button { padding: 10px 20px; cursor: pointer; background: #0f0e17; color: #fff; border: none; border-radius: 5px; }
</style>
</head>
<body>

<div id="progress">Score: 0 / 0</div>
<div id="quiz"></div>
<div class="nav">
  <button onclick="goBack()">Go Back</button>
  <button onclick="goNext()">Go Next</button>
</div>

<script>
const questions = [
  {q: "According to NCERT, giftedness from a teacher's perspective depends on a combination of:", options: ["IQ, birth order, and family income","High ability, high creativity, and high commitment","Academic grades, attendance, and test scores","Memory, speed, and reasoning"], correct: 1, explanation: "Teachers identify giftedness as requiring high ability + high creativity + high commitment — not just academic performance.", trap: "IQ alone is insufficient to identify giftedness; the triad of ability + creativity + commitment is key.", concept: "Intellectual Giftedness – Identification"},
  {q: "Non-western cultures value 'collectivistic orientation' as intelligent. This contrasts with which western emphasis?", options: ["Social harmony","Personal achievement and individualistic orientation","Emotional regulation","Naturalistic awareness"], correct: 1, explanation: "Western cultures emphasise personal achievement and individualism, while non-western cultures value collectivism and self-reflection.", trap: "Western cultures aren't anti-social, but their intelligence focus is on individual cognitive performance.", concept: "Culture and Intelligence – Non-Western"},
  {q: "A psychologist uses a combination of interview, psychological tests, and observation to study one individual comprehensively. This is best described as:", options: ["A structured interview","A case study","A projective test","Group assessment"], correct: 1, explanation: "Case studies use multiple methods to comprehensively study one individual's psychological attributes and history.", trap: "A single interview is not a case study — case studies integrate multiple data sources.", concept: "Assessment Methods – Case Study"},
  {q: "Emotional intelligence programmes in schools are noted in NCERT to produce which outcomes?", options: ["Increased IQ scores only","Reduced academic performance","Beneficial academic effects, cooperative behaviour, and reduced antisocial activity","Improved spatial reasoning only"], correct: 2, explanation: "EI programmes benefit academic achievement, encourage cooperation, and reduce antisocial behaviour in students.", trap: "EI programmes don't primarily target IQ — they address social-emotional skills that indirectly benefit academics.", concept: "Emotional Intelligence – Education"},
  {q: "A dancer who demonstrates exceptional body control and spatial awareness during performance is exhibiting which of Gardner's intelligences?", options: ["Musical intelligence","Spatial intelligence","Bodily-Kinaesthetic intelligence","Interpersonal intelligence"], correct: 2, explanation: "Bodily-Kinaesthetic intelligence involves flexible and creative use of the body — exemplified by dancers, athletes, and gymnasts.", trap: "Musical involves sound; Spatial involves mental images of space. Bodily-Kinaesthetic is specifically about physical movement.", concept: "Multiple Intelligences – Bodily-Kinaesthetic"},
  {q: "In PASS model, what happens when arousal is too high or too low?", options: ["Successive processing improves","Attention is enhanced","Attention and information processing are interfered with","Planning becomes more efficient"], correct: 2, explanation: "An optimal level of arousal is needed for focused attention. Extremes (too high or too low) interfere with cognitive processing.", trap: "Only optimal arousal helps; extremes harm performance — not just 'too little'.", concept: "PASS Model – Arousal/Attention"},
  {q: "Sunita scores perfectly on all academic tests but never generates original ideas. Rita scores average marks but constantly invents new solutions. According to the chapter, who is more creative?", options: ["Sunita, because creativity requires intelligence","Rita, because creativity involves generating novel ideas, not reproducing accurately","Both equally, since intelligence and creativity always correlate","Neither, since creativity cannot be observed in students"], correct: 1, explanation: "Rita's novel problem-solving exemplifies creativity; Sunita's accurate reproduction reflects intelligence. They are distinct.", trap: "Students assume high intelligence = high creativity. NCERT clearly states intelligence does not ensure creativity.", concept: "Creativity vs. Intelligence"},
  {q: "Which of the following is an example of 'simultaneous processing' in the PASS model?", options: ["Reciting multiplication tables in order","Learning the alphabet sequence","Solving a Raven's Progressive Matrices problem by seeing relationships among patterns","Memorising a poem line by line"], correct: 2, explanation: "Simultaneous processing integrates information into a meaningful pattern — RPM requires seeing spatial relationships all at once.", trap: "Reciting tables in order is successive (serial). RPM requires simultaneous pattern recognition.", concept: "PASS Model – Simultaneous Processing"},
  {q: "Why does NCERT warn against interpreting IQ as the only measure of success in life?", options: ["IQ tests are always culturally biased","Intelligence tests do not capture creative potential, practical intelligence, or EI","IQ scores change every year","IQ tests are only valid for children"], correct: 1, explanation: "IQ tests miss creativity, practical intelligence, emotional intelligence, and other factors critical for life success.", trap: "Cultural bias is a real concern but isn't the primary warning. The deeper issue is the narrow scope of IQ.", concept: "Misuses of Intelligence Tests"},
  {q: "A sociologist finds that children in a tribe excel at identifying plant species but score low on standard IQ tests. This best illustrates:", options: ["The children have intellectual disabilities","Intelligence is culturally situated and standard tests are culturally biased","The tribe does not educate children properly","Standard IQ tests are the gold standard across all cultures"], correct: 1, explanation: "Standard IQ tests favour western cultural skills; the tribal children's naturalistic intelligence is not captured by such tests.", trap: "Low IQ scores don't mean intellectual disability — especially when tests don't measure culturally relevant skills.", concept: "Culture and Intelligence – Bias"},
  {q: "Which of the following characteristics is listed in NCERT as typical of gifted children even in infancy?", options: ["Poor attention span","Preference for repetitive stimuli","Sensitivity to environmental changes and preference for novelty","Difficulty with language acquisition"], correct: 2, explanation: "NCERT states gifted infants/children show preference for novelty, good recognition memory, and sensitivity to environmental changes.", trap: "Gifted children are NOT inattentive — they have larger attention spans and prefer new stimuli.", concept: "Gifted Children – Characteristics"},
  {q: "The Differential Aptitude Tests (DAT) consists of how many independent subtests?", options: ["5","6","8","10"], correct: 2, explanation: "DAT has 8 subtests including Verbal Reasoning, Numerical Reasoning, Abstract Reasoning, Clerical Speed, Mechanical Reasoning, Space Relations, Spelling, and Language Usage.", trap: "Students often guess 6 or 10; the correct number is 8.", concept: "DAT – Aptitude Tests"},
  {q: "If a creative person draws from past experiences to make a new discovery, which of Sternberg's intelligences is most active?", options: ["Componential","Contextual","Experiential","Metacomponential"], correct: 2, explanation: "Experiential intelligence involves using past experiences creatively to produce novel solutions and inventions.", trap: "Metacomponential is part of componential intelligence (planning sub-component), not a standalone type.", concept: "Triarchic Theory – Experiential"},
  {q: "Why do group intelligence tests have limited rapport compared to individual tests?", options: ["Group tests are administered online","Group tests use multiple choice and cannot record subjects' feelings, moods, and expressions","Group tests are verbal only","Group tests do not have time limits"], correct: 1, explanation: "Individual tests allow the examiner to observe the test-taker closely; group tests cannot accommodate this personal observation.", trap: "Multiple-choice format is a feature of group tests, but the core limitation is the loss of individual rapport.", concept: "Individual vs. Group Intelligence Tests"},
  {q: "What does 'adaptive behaviour' mean in the context of diagnosing intellectual disability?", options: ["Ability to adapt to multiple languages","Capacity to be independent and deal effectively with one's environment","Scoring high on adaptive intelligence tests","Following school rules and norms"], correct: 1, explanation: "Adaptive behaviour = real-world independence and environmental competence. Deficits here are a required criterion for intellectual disability diagnosis.", trap: "It's not about language or test scores — it's about daily functioning independently.", concept: "Intellectual Disability – Adaptive Behaviour"},
  {q: "Psychologists argue that intelligence testing that favours middle-class populations may systematically underestimate the IQ of:", options: ["Urban children","Children from disadvantaged sections of society","Children with high emotional intelligence","Children who prefer performance tasks"], correct: 1, explanation: "Tests biased toward middle/upper-class norms produce artificially low scores for children from disadvantaged backgrounds.", trap: "This isn't about urban vs. rural — it's specifically about socioeconomic disadvantage and cultural mismatch.", concept: "Misuses of Intelligence Tests"},
  {q: "According to NCERT, creativity in children begins developing in early childhood through which primary mode?", options: ["Written language","Abstract symbolic thinking","Physical activities and non-verbal expression","Formal academic learning"], correct: 2, explanation: "Young children first express creativity through physical/non-verbal ways; verbal creative expression develops later when language matures.", trap: "Written language comes much later. Early creativity is embodied and physical.", concept: "Creativity – Development"},
  {q: "Which statement about the relationship between creativity and intelligence is MOST accurate according to NCERT?", options: ["High IQ guarantees high creativity","Creativity and intelligence are completely unrelated","Some intelligence is necessary for creativity, but beyond a level, they don't correlate well","Low IQ children cannot be creative"], correct: 2, explanation: "A baseline of intelligence supports creativity (to acquire and use knowledge), but very high IQ does not ensure creativity.", trap: "The relationship is positive but non-linear — high IQ is neither sufficient nor necessary for high creativity.", concept: "Creativity and Intelligence"},
  {q: "According to NCERT, integral intelligence (Indian tradition) differs from technological intelligence primarily in emphasising:", options: ["Speed and analysis","Connectivity with the social and natural world","Academic achievement","Logical-mathematical reasoning"], correct: 1, explanation: "Integral intelligence values holistic connectivity — social, emotional, and cognitive together — versus the individualistic, analytical focus of technological intelligence.", trap: "Technological intelligence = speed + analysis; integral intelligence = holistic connectivity.", concept: "Indian vs. Western Intelligence Concepts"},
  {q: "A person who succeeds not by adapting to an environment, but by choosing a more favourable one, is demonstrating which component of Sternberg's theory?", options: ["Componential intelligence","Metacomponents","Contextual intelligence","Experiential intelligence"], correct: 2, explanation: "Contextual intelligence involves adapting to, shaping, OR selecting a more favourable environment.", trap: "Adaptation and selection are both part of contextual intelligence — students often only remember adaptation.", concept: "Triarchic Theory – Contextual"},
  {q: "A researcher finds that a child's intelligence correlates 0.25 with a sibling reared apart. What does this suggest compared to identical twins reared apart (0.72)?", options: ["Siblings share more environment than twins","The genetic contribution to intelligence is greater than sibling-level genetic sharing","Siblings and twins are equally intelligent","Rearing apart increases intelligence in both cases"], correct: 1, explanation: "Higher correlations for identical twins (more shared genes) vs. siblings (fewer shared genes) support the genetic component of intelligence.", trap: "This isn't about environment — the environment is equally absent (reared apart). Difference is genetic relatedness.", concept: "Heredity and Intelligence – Twin Studies"},
  {q: "In Guilford's model, 'divergent production' is listed under which dimension?", options: ["Contents","Products","Operations","Relations"], correct: 2, explanation: "Operations in Guilford's model include what the respondent does — and divergent production is one of six operations.", trap: "Students confuse operations (what you DO) with products (form of information). Divergent production is an operation.", concept: "Guilford's SOI – Operations"},
  {q: "Environmental deprivation is most likely to affect intelligence in which direction?", options: ["Increases intelligence by forcing problem-solving","Has no measurable effect","Lowers intelligence","Only affects personality, not intelligence"], correct: 2, explanation: "NCERT explicitly states that environmental deprivation lowers intelligence, while rich nurturing raises it.", trap: "Some students guess 'increases' through 'hardship builds resilience' logic. NCERT evidence says deprivation lowers IQ.", concept: "Environment and Intelligence"},
  {q: "A person who can easily navigate new cities, read maps, and design interiors likely has high:", options: ["Bodily-Kinaesthetic intelligence","Interpersonal intelligence","Spatial intelligence","Naturalistic intelligence"], correct: 2, explanation: "Spatial intelligence involves forming, using, and transforming mental images of space — essential for navigation and design.", trap: "Naturalistic is about nature/species; Bodily-Kinaesthetic is about physical movement, not spatial reasoning.", concept: "Multiple Intelligences – Spatial"},
  {q: "Which characteristic of values makes them different from mere opinions or preferences?", options: ["Values change frequently with age","Values are enduring beliefs that set standards for behaviour and judgement","Values are measured by psychological tests only","Values are inherited, not learned"], correct: 1, explanation: "Values are enduring (long-lasting) and normative (guide what should be done), unlike temporary opinions.", trap: "Values can be measured by tests, but what makes them unique is their enduring and normative nature.", concept: "Values – Definition"},
  {q: "Which of the following best illustrates the 'knowledge acquisition component' in Sternberg's componential intelligence?", options: ["Deciding how to approach a maths problem","Learning the steps of long division for the first time","Actually solving the maths problem","Evaluating whether the answer makes sense"], correct: 1, explanation: "Knowledge acquisition = learning and acquiring new procedures. Meta-components plan; performance components execute.", trap: "All three sub-components work together; the acquisition component is specifically about initial learning.", concept: "Triarchic Theory – Componential Sub-components"},
  {q: "A bird-watcher who can identify 200 species by sight and sound alone is demonstrating high:", options: ["Musical intelligence","Bodily-Kinaesthetic intelligence","Naturalistic intelligence","Spatial intelligence"], correct: 2, explanation: "Naturalistic intelligence involves recognising and discriminating features of the natural world — flora, fauna, and natural phenomena.", trap: "Musical is about sound patterns in music, not animal/nature sounds. Naturalistic covers the natural world broadly.", concept: "Multiple Intelligences – Naturalistic"},
  {q: "According to Terman's research in the 1920s, persons with high IQ were:", options: ["Always highly creative","Necessarily creative in adulthood","Not necessarily creative","The only ones who showed creativity"], correct: 2, explanation: "Terman found that high IQ did not guarantee creativity — and none of his tracked gifted individuals became widely known for creative achievement.", trap: "High IQ might correlate slightly with creativity on average, but it doesn't guarantee it.", concept: "Creativity and Intelligence"},
  {q: "Gardner proposed that different types of intelligences are:", options: ["Correlated and interdependent — high in one means high in all","Independent of each other — high in one does NOT mean high in others","Always present at equal levels across all individuals","Solely determined by genetic inheritance"], correct: 1, explanation: "A key claim of Gardner's theory is that the eight intelligences are independent; excelling in one does not predict performance in another.", trap: "They CAN interact on tasks, but being high on one doesn't mean you're high on others — that's the core independence claim.", concept: "Multiple Intelligences – Independence"},
  {q: "A person who can keep their emotions in check during a high-pressure conflict is demonstrating which component of emotional intelligence?", options: ["Perceiving emotions in others","Using emotions to enhance thinking","Regulating and controlling emotional expression","Monitoring others' emotional cues"], correct: 2, explanation: "Emotional regulation — controlling one's own emotional expression — is a key component of emotional intelligence.", trap: "Monitoring others' emotions is interpersonal; regulation is self-directed emotional control.", concept: "Emotional Intelligence – Regulation"},
  {q: "Which of Guilford's three dimensions describes 'the form in which information is processed and stored'?", options: ["Operations","Contents","Products","Relations"], correct: 2, explanation: "Products in Guilford's model = the form of processed information (units, classes, relations, systems, transformations, implications).", trap: "Contents = what the information is made of; Products = how it's structured and stored.", concept: "Guilford's SOI – Products"},
  {q: "In Binet's earliest conceptualisation, intelligence consisted of:", options: ["Seven independent primary abilities","General and specific factors","One set of similar abilities usable across all problems","Eight distinct independent intelligences"], correct: 2, explanation: "Binet's Uni/One-factor theory saw intelligence as a single, uniform set of abilities applicable to any problem.", trap: "Seven abilities = Thurstone; General + Specific = Spearman; Eight types = Gardner.", concept: "Theories of Intelligence – Binet's Uni-factor"},
  {q: "Which psychologist is associated with the 'two-factor theory' of intelligence employing factor analysis?", options: ["Alfred Binet","Charles Spearman","Louis Thurstone","J.P. Guilford"], correct: 1, explanation: "Spearman used factor analysis in 1927 to identify the g-factor (general) and s-factors (specific) in intelligence.", trap: "Thurstone also used factor analysis but proposed seven primary abilities, not two factors.", concept: "Spearman – Two-Factor Theory"},
  {q: "Robert Sternberg's triarchic theory belongs to which major approach to understanding intelligence?", options: ["Psychometric approach","Behaviourist approach","Information-processing approach","Neurological approach"], correct: 2, explanation: "Sternberg's triarchic theory describes the cognitive processes underlying intelligent behaviour — a hallmark of the information-processing approach.", trap: "Spearman and Gardner lean more toward psychometric/structural; Sternberg is information-processing.", concept: "Sternberg – Theoretical Approach"},
  {q: "Thurstone proposed his theory of primary mental abilities as a follow-up/reaction to which earlier theory?", options: ["Gardner's multiple intelligences","Binet's uni-factor theory","Spearman's two-factor theory","Jensen's hierarchical model"], correct: 2, explanation: "Thurstone's work followed and built on/disputed Spearman's two-factor theory, breaking intelligence into seven primary abilities.", trap: "Thurstone followed Spearman's work, not Binet's directly — the historical sequence matters.", concept: "Thurstone – Historical Context"},
  {q: "Gardner's theory of multiple intelligences was based primarily on studying which group of individuals?", options: ["Average schoolchildren","Intellectually disabled individuals","Extremely talented persons with exceptional abilities","Cross-cultural adult samples"], correct: 2, explanation: "Gardner studied exceptionally talented individuals to identify the distinct types of intelligences that could exist independently.", trap: "He didn't study average children or disabled individuals as his primary basis — it was exceptional talent.", concept: "Gardner – Methodology"},
  {q: "Arthur Jensen's Level II intelligence is characterised as:", options: ["Rote learning with output similar to input","Associative memory tasks","Higher-order skills that transform input into effective output","Emotional regulation skills"], correct: 2, explanation: "Jensen's Level II (cognitive competence) involves transformation of input through higher-order cognitive processing.", trap: "Level I = associative/rote; Level II = transformation/cognitive competence. Students often reverse these.", concept: "Jensen – Hierarchical Model"},
  {q: "J.P. Das incorporated cultural and environmental experiences as a 'knowledge base' that PASS processes operate upon. This makes PASS different from purely neurological models because:", options: ["PASS ignores the brain entirely","PASS acknowledges that formal and informal environmental learning shapes cognitive functioning","PASS only measures school-taught skills","PASS uses IQ as its central concept"], correct: 1, explanation: "PASS processes operate on knowledge acquired both formally (school) and informally (environment), making the model contextually rich.", trap: "PASS IS neurological (three brain units) but also integrates environmental knowledge — it's not ONLY neurological.", concept: "PASS Model – Knowledge Base"},
  {q: "Salovey and Mayer's definition of emotional intelligence emphasises 'monitoring one's own and others' emotions' to:", options: ["Calculate EQ scores","Guide thinking and actions","Improve IQ performance","Diagnose mental disorders"], correct: 1, explanation: "For Salovey and Mayer, the purpose of monitoring emotions is to use that information to guide thinking and behaviour.", trap: "EQ scores are derived from EI, but the purpose of monitoring emotions is to guide action — not produce scores.", concept: "Emotional Intelligence – Salovey and Mayer"},
  {q: "Vygotsky's contribution to intelligence theory is primarily associated with emphasising the role of:", options: ["Genetic determination","Factor structure of intelligence","Culture and social context in shaping intellectual development","Neural efficiency"], correct: 2, explanation: "Vygotsky argued that culture provides the social context within which intelligence develops and is expressed.", trap: "Vygotsky is cultural-social, not genetic or psychometric.", concept: "Vygotsky – Culture and Intelligence"},
  {q: "Howard Gardner and Robert Sternberg both departed from traditional intelligence theory by arguing that:", options: ["IQ tests are perfectly valid","Intelligence is a single g-factor","Intelligent individuals actively modify or shape their environment, not just adapt","Memory is the primary component of intelligence"], correct: 2, explanation: "Both Gardner and Sternberg extended Wechsler's adaptive definition — they argued intelligent people actively shape environments.", trap: "Adaptation is Wechsler's idea; the active 'shaping' is the shared innovation of Gardner and Sternberg.", concept: "Gardner and Sternberg – Active Shaping"},
  {q: "Which psychologist first used the term 'Intelligence Quotient' (IQ)?", options: ["Alfred Binet","Theodore Simon","William Stern","Lewis Terman"], correct: 2, explanation: "William Stern, a German psychologist, devised the IQ concept in 1912 as MA/CA × 100.", trap: "Binet developed the scale; Stern developed the IQ formula. Terman later popularised IQ testing in the US.", concept: "IQ – William Stern"},
  {q: "J.P. Das described 'buddhi' as including which broad competencies beyond western intelligence concepts?", options: ["Speed and reaction time","Determined action, feelings, will, and conscience alongside cognitive competence","Verbal and non-verbal reasoning only","Academic aptitude and memory"], correct: 1, explanation: "Das's interpretation of buddhi includes non-cognitive elements like feelings, will, determined action, and conscience — far broader than western cognitive definitions.", trap: "Western IQ focuses on cognitive competence; buddhi adds affective and motivational dimensions.", concept: "J.P. Das – Buddhi"},
  {q: "Guilford's model is considered part of which theoretical tradition in intelligence research?", options: ["Information-processing approach","Psychometric/structural approach","Biological approach","Behavioural approach"], correct: 1, explanation: "Guilford's structure-of-intellect uses factor analysis to define intelligence as intellectual traits — a psychometric/structural approach.", trap: "Sternberg and Das are information-processing; Guilford (like Spearman and Thurstone) is psychometric.", concept: "Guilford – Theoretical Tradition"},
  {q: "Pramila Pathak is associated with which Indian intelligence assessment tool?", options: ["Bhatia's Battery","Draw-a-Man Test","Group Test of Intelligence","Bihar Test of Intelligence"], correct: 1, explanation: "The Draw-a-Man Test was developed by Pramila Pathak as an Indian performance intelligence test.", trap: "Bhatia developed the Battery; Pathak developed Draw-a-Man — names and tests are frequently mixed.", concept: "Intelligence Testing in India – Pathak"},
  {q: "S.K. Kulshrestha is associated with which Indian intelligence test?", options: ["Group Test of General Mental Ability","Indian Adaptation of Stanford-Binet Test (Third Edition)","CIE Non-verbal Group Test","Test of General Mental Ability (Hindi)"], correct: 1, explanation: "S.K. Kulshrestha developed the Indian Adaptation of the Stanford-Binet Test (Third Edition).", trap: "S. Jalota developed Group Test of General Mental Ability; M.C. Joshi developed the Hindi ability test.", concept: "Intelligence Testing in India – Kulshrestha"},
  {q: "Which psychologist proposed that intelligence consists of seven relatively independent primary mental abilities?", options: ["Spearman","Guilford","Thurstone","Jensen"], correct: 2, explanation: "Louis Thurstone's primary mental abilities theory identified seven independent cognitive abilities.", trap: "Spearman proposed 2 factors; Guilford proposed 180 cells; Thurstone is specifically 7 primary abilities.", concept: "Thurstone – Primary Mental Abilities"},
  {q: "According to Sternberg's contextual intelligence, a street-smart person who modifies their environment to fit their needs is doing what?", options: ["Adapting","Shaping/Modifying","Selecting","Component analysis"], correct: 1, explanation: "Contextual intelligence involves three strategies: adapting to, shaping/modifying, or selecting environments. Modification fits existing circumstances.", trap: "Selection = choosing a new environment; Adaptation = adjusting to the current one; Shaping = changing it to fit you.", concept: "Triarchic Theory – Contextual Strategies"},
  {q: "Who made the first successful attempt to formally measure intelligence in 1905?", options: ["Wechsler and Spearman","Binet and Simon","Terman and Thurstone","Stern and Galton"], correct: 1, explanation: "Alfred Binet and Theodore Simon developed the first intelligence scale in 1905.", trap: "Galton studied individual differences earlier but didn't produce a successful intelligence test.", concept: "History of Intelligence Testing – Binet and Simon"},
  {q: "Wechsler's intelligence tests remain the most widely used in the world. His definition describes intelligence as functioning at which two levels?", options: ["Conscious and unconscious","Individual and group","Rational thinking and purposeful action","Analytical and creative"], correct: 2, explanation: "Wechsler defined intelligence as the global capacity to think rationally AND act purposefully — two key dimensions.", trap: "Sternberg's three types come later; Wechsler's definition focuses on rational thinking + purposeful action.", concept: "Wechsler – Definition"}
];

let score = 0;
let attempted = 0;

function loadQuiz() {
  const quiz = document.getElementById("quiz");

  questions.forEach((q, index) => {
    let html = `<div class="card">`;
    html += `<p><b>Q${index+51}. ${q.q}</b></p>`;

    q.options.forEach((opt, i) => {
      html += `<button class="option" onclick="check(${index}, ${i}, this)">${opt}</button>`;
    });

    html += `<p id="res${index}"></p>`;

    html += `<div class="explanation hidden" id="exp${index}">
                <p><b>Explanation:</b> ${q.explanation}</p>
                <p><b>Concept:</b> ${q.concept}</p>
                <p><b>Trap:</b> ${q.trap}</p>
             </div>`;
    html += `</div>`;
    quiz.innerHTML += html;
  });
}

function check(qIndex, selected, btn) {
  const res = document.getElementById("res" + qIndex);
  const exp = document.getElementById("exp" + qIndex);

  if (res.innerHTML !== "") return;

  attempted++;

  if (selected === questions[qIndex].correct) {
    res.innerHTML = "✅ Correct";
    res.className = "correct";
    score++;
  } else {
    res.innerHTML = "❌ Incorrect";
    res.className = "wrong";
  }

  exp.classList.remove("hidden");
  disableOptions(qIndex);
  updateProgress();
}

function disableOptions(qIndex) {
  const buttons = document.querySelectorAll(`.card:nth-child(${qIndex+1}) .option`);
  buttons.forEach(btn => btn.disabled = true);
}

function updateProgress() {
  document.getElementById("progress").innerText = `Score: ${score} / ${attempted}`;
}

function goBack() {
  window.location.href = "level1_set1.html";
}

function goNext() {
  window.location.href = "level1_set3.html";
}

loadQuiz();
</script>
</body>
</html>
