    explanation: "Integral intelligence is the Indian tradition's term, emphasising holistic connectivity with social and natural world — beyond western cognitive definitions.",
    trap: "Sternberg's contextual is practical/street-smart; integral intelligence is the specific Indian traditional concept.",
    concept: "Indian Intelligence Tradition"
  },
  {
    q: "A psychologist warns that intelligence tests may 'attach a stigma to children.' This is a concern about:",
    options: ["Test reliability","Misuse of intelligence tests","IQ formula accuracy","Cultural fairness of tests"],
    correct: 1,
    explanation: "NCERT's Box 1.1 explicitly warns that poor test performance can stigmatise children — a form of misuse.",
    trap: "Reliability is a technical test property; stigmatisation is a social consequence of misuse.",
    concept: "Misuses of Intelligence Tests"
  }
];

let score = 0;
let attempted = 0;

function loadQuiz() {
  const quiz = document.getElementById("quiz");

  questions.forEach((q, index) => {
    let html = `<div class="card">`;
    html += `<p><b>Q${index + 101}. ${q.q}</b></p>`;

    q.options.forEach((opt, i) => {
      html += `<button class="option" onclick="check(${index}, ${i}, this)">${opt}</button>`;
    });

    html += `<p id="res${index}"></p>`;
    html += `<div class="explanation hidden" id="exp${index}">
                <p><b>Explanation:</b> ${q.explanation}</p>
                <p><b>Concept:</b> ${q.concept}</p>
                <p><b>Trap:</b> ${q.trap}</p>
             </div>`;
    html += `</div>`;
    quiz.innerHTML += html;
  });
}

function check(qIndex, selected, btn) {
  const res = document.getElementById("res" + qIndex);
  const exp = document.getElementById("exp" + qIndex);

  if (res.innerHTML !== "") return;

  attempted++;

  if (selected === questions[qIndex].correct) {
    res.innerHTML = "✅ Correct";
    res.className = "correct";
    score++;
  } else {
    res.innerHTML = "❌ Incorrect";
    res.className = "wrong";
  }

  exp.classList.remove("hidden");
  disableOptions(qIndex);
  updateProgress();
}

function disableOptions(qIndex) {
  const buttons = document.querySelectorAll(`.card:nth-child(${qIndex+1}) .option`);
  buttons.forEach(btn => btn.disabled = true);
}

function updateProgress() {
  document.getElementById("progress").innerText = `Score: ${score} / ${attempted}`;
}

function goBack() {
  window.location.href = "level1_set2.html";
}

function goNext() {
  window.location.href = "level1_set4.html";
}

loadQuiz();
</script>
